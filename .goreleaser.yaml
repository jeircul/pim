project_name: pim
before:
  hooks:
    - go mod tidy
    - sh -c "mkdir -p completions && go run . completion bash > completions/pim.bash && go run . completion zsh > completions/pim.zsh && go run . completion fish > completions/pim.fish"
builds:
  - id: pim
    main: .
    binary: pim
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - 7
archives:
  - id: archive
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - completions/pim.bash
      - completions/pim.zsh
      - completions/pim.fish
checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'
changelog:
  use: git
release:
  github:
    owner: jeircul
    name: pim
