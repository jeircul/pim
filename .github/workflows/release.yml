name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Go cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Validate tag format
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -q 'dirty'; then
            echo "✗ Tag '$TAG' contains '-dirty' — commit all changes before releasing"
            exit 1
          fi
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-dev\.[0-9]+-g[0-9a-f]+)?$'; then
            echo "✗ Tag '$TAG' does not match required format: v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-dev.<n>-g<sha>"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
